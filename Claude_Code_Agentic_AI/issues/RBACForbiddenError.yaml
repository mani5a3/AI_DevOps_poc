# =============================================================================
# Issue: RBACForbiddenError - Pod with forbidden permissions
# =============================================================================
# Description:
#   Pod is using a service account with insufficient RBAC permissions.
#   The container tries to perform operations that are not allowed.
#
# Symptoms:
#   - Pod runs but operations fail with "Forbidden" errors
#   - Events show RBAC permission denied messages
#   - Container logs show API access errors
#
# Resolution:
#   1. Review the service account: kubectl get serviceaccount <sa-name>
#   2. Create/update RBAC roles/clusterroles with needed permissions
#   3. Bind the role to the service account
#   4. Use the principle of least privilege
#   5. Test with a service account that has appropriate permissions
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-forbidden
  labels:
    app: rbac-forbidden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbac-forbidden
  template:
    metadata:
      labels:
        app: rbac-forbidden
    spec:
      serviceAccountName: limited-sa
      containers:
      - name: app
        image: bitnami/kubectl:latest
        command: ["sh", "-c", "kubectl get pods --all-namespaces && sleep 3600"]
        # This will fail due to RBAC - service account has limited permissions