# Issue: CPUThrottling - CPU throttling due to limits
apiVersion: v1
kind: Pod
metadata:
  name: cpu-throttled-pod
  labels:
    app: cpu-throttle
spec:
  containers:
  - name: app
    image: nginx:1.25
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "128Mi"
        cpu: "1000m"
      limits:
        memory: "256Mi"
        cpu: "100m"