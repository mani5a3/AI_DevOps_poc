# =============================================================================
# Issue: NetworkPolicyBlocking - Network policy blocks traffic
# =============================================================================
# Description:
#   NetworkPolicy blocks all ingress or egress traffic to/from the pod.
#   Empty policyTypes or empty ingress/egress rules deny all traffic.
#
# Symptoms:
#   - Pod cannot receive external traffic
#   - Pod cannot connect to external services
#   - Application shows connection refused errors
#
# Resolution:
#   1. Review the NetworkPolicy: kubectl get networkpolicy <name> -o yaml
#   2. Add ingress rules to allow necessary traffic
#   3. Add egress rules for external connections
#   4. Use pod selector to target specific pods
#   5. Test connectivity after policy updates
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-policy-app
  labels:
    app: network-policy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-policy-app
  template:
    metadata:
      labels:
        app: network-policy-app
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
spec:
  podSelector:
    matchLabels:
      app: network-policy-app
  policyTypes:
  - Ingress
  - Egress
  # Empty ingress/egress blocks all traffic