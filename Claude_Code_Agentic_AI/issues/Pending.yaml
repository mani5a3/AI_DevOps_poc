# Issue: Pending - Pod cannot be scheduled (unschedulable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pending
  labels:
    app: pending
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pending
  template:
    metadata:
      labels:
        app: pending
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - containerPort: 80
      # Request huge resources that won't be available
      resources:
        requests:
          memory: "999Gi"
          cpu: "999"
        limits:
          memory: "999Gi"
          cpu: "999"