# =============================================================================
# Issue: OOMKilled - Container killed due to out of memory
# =============================================================================
# Description:
#   Container is killed by the OOM (Out of Memory) killer. The memory limit is
#   too low for the application to run properly.
#
# Symptoms:
#   - Pod status: OOMKilled
#   - Container restart count increases
#   - Events: "Container killed due to memory limit exceeded"
#
# Resolution:
#   1. Increase memory limits in the container resources section
#   2. Review the application's memory usage
#   3. Check for memory leaks in the application
#   4. Set appropriate memory requests and limits
#   5. Consider using memory profiling to optimize usage
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-killed
  labels:
    app: oom-killed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-killed
  template:
    metadata:
      labels:
        app: oom-killed
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        command: ["python", "-c", "import sys; data = [x*2 for x in range(100000000)]; print(sum(data))"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "32Mi"
            cpu: "100m"