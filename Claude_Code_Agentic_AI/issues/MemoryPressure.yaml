# Issue: MemoryPressure - Node has memory pressure
apiVersion: v1
kind: Pod
metadata:
  name: memory-pressure-pod
  labels:
    app: memory-pressure
spec:
  containers:
  - name: app
    image: nginx:1.25
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "1000m"