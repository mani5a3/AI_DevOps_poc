# =============================================================================
# Issue: Evicted - Pod evicted due to node pressure
# =============================================================================
# Description:
#   Pod is evicted from the node due to resource pressure (memory, disk, or PID).
#   This happens when the node cannot accommodate the pod's resource requests.
#
# Symptoms:
#   - Pod status: Evicted
#   - Reason: "MemoryPressure", "DiskPressure", or "PIDPressure"
#
# Resolution:
#   1. Add resource tolerations for node conditions
#   2. Reduce pod resource requests if possible
#   3. Add more nodes to the cluster
#   4. Configure pod disruption budgets for critical workloads
#   5. Clean up unused pods and resources
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evicted
  labels:
    app: evicted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evicted
  template:
    metadata:
      labels:
        app: evicted
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "1Gi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "500m"
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoSchedule"
        tolerationSeconds: 1