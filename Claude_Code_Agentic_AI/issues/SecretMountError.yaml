# Issue: SecretMountError - Secret mount failure
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-mount-error
  labels:
    app: secret-mount-error
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-mount-error
  template:
    metadata:
      labels:
        app: secret-mount-error
    spec:
      containers:
      - name: app
        image: nginx:latest
        volumeMounts:
        - name: secret
          mountPath: /etc/secret
          readOnly: true
      volumes:
      - name: secret
        secret:
          secretName: non-existent-secret  # This doesn't exist!