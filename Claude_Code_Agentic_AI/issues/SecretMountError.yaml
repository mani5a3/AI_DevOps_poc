# =============================================================================
# Issue: SecretMountError - Secret mount failure
# =============================================================================
# Description:
#   Pod fails to start because it references a Secret that doesn't exist.
#   The volume mount configuration points to a non-existent Secret.
#
# Symptoms:
#   - Pod status: ContainerCreating or Error
#   - Events: "not found: Secret <name>"
#   - Volume mount fails
#
# Resolution:
#   1. Create the missing Secret: kubectl create secret generic <name>
#   2. Verify the Secret name matches the volume reference
#   3. Ensure Secret is in the same namespace as the pod
#   4. Check the volume mount configuration in the pod spec
#   5. Use optional: true if the Secret is optional
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-mount-error
  labels:
    app: secret-mount-error
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-mount-error
  template:
    metadata:
      labels:
        app: secret-mount-error
    spec:
      containers:
      - name: app
        image: nginx:latest
        volumeMounts:
        - name: secret
          mountPath: /etc/secret
          readOnly: true
      volumes:
      - name: secret
        secret:
          secretName: non-existent-secret  # This doesn't exist!